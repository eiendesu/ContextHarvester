<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Harvester — Graph View</title>
  <link rel="stylesheet" href="/vendor/vis-network/vis-network.min.css" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="topbar">
    <h1>🌾 Context Harvester — Graph View</h1>
    <span id="status-line" class="muted">Caricamento...</span>
  </header>

  <nav class="tabs" id="tabs">
    <button type="button" class="tab" data-tab="graph">🗺 Grafo (legacy)</button>
    <button type="button" class="tab active" data-tab="sigma">◈ Grafo</button>
    <button type="button" class="tab" data-tab="impact">⚡ Impact</button>
    <button type="button" class="tab" data-tab="analysis">🔍 Analisi</button>
    <button type="button" class="tab" data-tab="functions">🏷 Funzionalità</button>
  </nav>

  <main>
    <section id="panel-graph" class="panel">
      <div class="toolbar">
        <input type="search" id="graph-search" placeholder="Cerca nodo o simbolo..." />
        <button type="button" id="graph-search-btn" class="primary">🔍 Cerca</button>
        <select id="graph-group-filter" title="Filtra per funzionalità mappata">
          <option value="">Tutte le funzionalità</option>
        </select>
        <button type="button" id="graph-filter-reset">Reset filtri</button>
        <button type="button" id="graph-fit">Fit all</button>
      </div>
      <div class="toolbar label-first-inline">
        <span class="label-inline">Funzionalità da label:</span>
        <input type="text" id="graph-lf-input" placeholder="pagina lista contratti" style="flex:1;min-width:12rem" />
        <button type="button" id="graph-lf-search" class="primary">🔍 Cerca nel grafo</button>
        <label class="muted">Depth <input type="number" id="graph-lf-depth" value="2" min="1" max="4" style="width:3rem" /></label>
      </div>
      <p id="graph-lf-status" class="muted small lf-status-inline"></p>
      <div id="graph-network"></div>
      <div id="graph-selection" class="selection-bar muted">Nessun nodo selezionato</div>
    </section>

    <section id="panel-impact" class="panel">
      <div class="toolbar">
        <label>Nodo: <input type="text" id="impact-node" placeholder="nome metodo, endpoint o path file" style="min-width:14rem" /></label>
        <button type="button" id="impact-run">Analizza</button>
        <label>Distanza <input type="number" id="impact-depth" value="3" min="1" max="8" style="width:3rem" /></label>
        <select id="impact-direction" title="Direzione">
          <option value="downstream">Downstream</option>
          <option value="upstream">Upstream</option>
        </select>
        <select id="impact-mode">
          <option value="transitive">Transitive</option>
          <option value="direct">Direct</option>
        </select>
        <label><input type="checkbox" id="impact-v2" checked /> v2 typed</label>
        <label><input type="checkbox" id="impact-cross-layer" /> Cross-layer API</label>
      </div>
      <div id="impact-results" class="scroll-panel"></div>
    </section>

    <section id="panel-analysis" class="panel">
      <div class="toolbar">
        <button type="button" id="analysis-recalc">🔄 Ricalcola analisi</button>
        <span id="analysis-meta" class="muted"></span>
      </div>
      <div id="analysis-sections" class="scroll-panel"></div>
      <div id="analysis-info-modal" class="info-modal hidden" role="dialog" aria-modal="true" aria-labelledby="analysis-info-title">
        <div class="info-modal-backdrop" id="analysis-info-backdrop"></div>
        <div class="info-modal-box">
          <h3 id="analysis-info-title"></h3>
          <div id="analysis-info-body" class="info-modal-body"></div>
          <button type="button" id="analysis-info-close" class="primary">Chiudi</button>
        </div>
      </div>
    </section>

    <section id="panel-functions" class="panel">
      <div class="toolbar">
        <input type="search" id="fn-filter" placeholder="Filtra funzionalità..." />
        <button type="button" id="fn-refresh">Aggiorna</button>
      </div>
      <div id="fn-list" class="scroll-panel"></div>
      <div class="label-first-box">
        <h3>➕ Crea da label</h3>
        <div class="toolbar">
          <input type="text" id="lf-input" placeholder="pagina lista contratti" style="flex:1" />
          <button type="button" id="lf-search">🔍 Cerca nel grafo</button>
        </div>
        <div class="toolbar">
          <label>Depth <input type="number" id="lf-depth" value="2" min="1" max="4" style="width:3rem" /></label>
          <label>Max nodi <input type="number" id="lf-max" value="100" min="10" max="300" style="width:4rem" /></label>
        </div>
        <p id="lf-status" class="muted"></p>
        <label>Nome funzionalità <input type="text" id="lf-name" style="width:100%" /></label>
        <ul id="lf-nodes" class="node-pick-list"></ul>
        <button type="button" id="lf-save" class="primary" disabled>✅ Salva come funzionalità</button>
      </div>
    </section>

    <section id="panel-sigma" class="panel active">
      <div class="toolbar sigma-toolbar">
        <input type="search" id="sigma-search" placeholder="Cerca file, metodo, DTO, endpoint (min 2 char per full detail)..." style="flex:1;min-width:12rem" />
        <button type="button" id="sigma-search-btn" class="primary">Cerca</button>
        <button type="button" id="sigma-fit">Fit</button>
        <button type="button" id="sigma-collapse" disabled>◁ File view</button>
        <button type="button" id="sigma-full-detail">Full detail</button>
      </div>
      <div class="toolbar sigma-filters">
        <label>Peso min <input type="number" id="sigma-min-weight" value="0" min="0" max="5" step="0.1" style="width:3rem" /></label>
        <label>Max nodi <input type="number" id="sigma-max-nodes" value="400" min="50" max="2000" style="width:4rem" /></label>
        <label><input type="checkbox" id="sigma-hide-private" checked /> Nascondi private</label>
        <label><input type="checkbox" data-sigma-type="method" checked /> Metodi</label>
        <label><input type="checkbox" data-sigma-type="dto" checked /> DTO</label>
        <label><input type="checkbox" data-sigma-type="api_client_method" checked /> API client</label>
        <label><input type="checkbox" data-sigma-type="api_endpoint" checked /> Endpoint</label>
        <label><input type="checkbox" id="sigma-cross-layer" /> Cross-layer impact</label>
        <label>Impact depth <input type="number" id="sigma-impact-depth" value="2" min="1" max="6" style="width:2.5rem" /></label>
        <select id="sigma-impact-dir"><option value="downstream">Down</option><option value="upstream">Up</option></select>
      </div>
      <div class="toolbar">
        <input type="text" id="sigma-path-from" placeholder="Path from (id o label)" style="flex:1" />
        <input type="text" id="sigma-path-to" placeholder="Path to" style="flex:1" />
        <button type="button" id="sigma-path-btn">Traccia percorso API</button>
      </div>
      <p id="sigma-path-result" class="muted small path-result"></p>
      <p id="sigma-status" class="muted small"></p>
      <div id="sigma-container" class="graph-container"></div>
      <div id="sigma-impact-preview" class="sigma-impact-preview muted small"></div>
      <div id="sigma-detail" class="sigma-detail-panel hidden">
        <h3 id="sigma-detail-title">Dettaglio</h3>
        <pre id="sigma-detail-body" class="sigma-detail-body"></pre>
      </div>
    </section>
  </main>

  <script src="/vendor/vis-network/vis-network.min.js"></script>
  <script src="https://unpkg.com/graphology@0.25.4/dist/graphology.umd.min.js"></script>
  <script src="https://unpkg.com/sigma@2.4.0/dist/sigma.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/sigma-view.js"></script>
</body>
</html>
